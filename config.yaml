hyperparameters:
  epochs: 20            # Fixed training duration (avoid overfitting)
  batch_size: 64        # Stable gradient estimation
  lr: 0.001             # Good starting learning rate for Adam
  num_workers: 4        # Prevents CPU overload in Windows/WSL systems
  val_split: 0.1        # 10% validation data

paths:
  train_dir: 'data/cifar10/train'
  test_dir: 'data/cifar10/test'
  model_path: 'weights/checkpoint.pth'